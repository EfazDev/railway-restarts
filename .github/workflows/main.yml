name: Weekly Railway
on:
    schedule:
        - cron: "0 0 * * 1"
    workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: EfazDev API
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_API }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
      - name: EfazDev Dashboard Save Data
        run: |
          curl -X GET https://dashboard.efaz.dev/api/updating \
          -H "X-Authorization-Key: ${{ secrets.EFAZDEV_DASHBOARD_UPDATE_KEY }}" \
          > /dev/null 2>&1
      - name: EfazDev Dashboard
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_DASHBOARD }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
      - name: EfazDev Railway API
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_RAILWAYAPI }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
      - name: EfazDev Proxy
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_PROXY }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
      - name: EfazDev Personal Assistant
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_ASSISTANT }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
      - name: EfazDev Website
        run: |
          curl -X POST https://backboard.railway.com/graphql/v2 \
          -H "Project-Access-Token: ${{ secrets.RAILWAY_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"query":"mutation serviceInstanceRedeploy($serviceId: String!, $environmentId: String!) {serviceInstanceRedeploy(serviceId: $serviceId, environmentId: $environmentId)}","variables":{"serviceId":"${{ secrets.RAILWAY_SERVICE_WEBSITE }}","environmentId":"${{ secrets.RAILWAY_ENV }}"}}' \
          > /dev/null 2>&1
